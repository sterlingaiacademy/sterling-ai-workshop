name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main   # Auto-deploy every time you push to main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Authenticate with Google Cloud using Service Account
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: Set up gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Step 4: Build Docker image and push to Google Container Registry
      - name: Build & Push Docker Image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/sterling-ai-workshop \
            --project ${{ secrets.GCP_PROJECT_ID }}

      # Step 5: Deploy the new image to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy sterling-ai-workshop \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/sterling-ai-workshop \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --set-env-vars "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }},RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }},PORT=8080" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      # Step 6: Print the live URL
      - name: Get Live URL
        run: |
          echo "✅ Deployment complete!"
          gcloud run services describe sterling-ai-workshop \
            --platform managed \
            --region asia-south1 \
            --format 'value(status.url)' \
            --project ${{ secrets.GCP_PROJECT_ID }}
